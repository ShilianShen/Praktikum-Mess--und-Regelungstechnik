<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retro Emoji Throw</title>

  <style>
    :root {
      --bg: #050505;
      --text: #f4efc7;
      --muted: #b8b28f;
      --line: #706b4f;
      --button-bg: #11110e;
      --button-hover: #f4efc7;
      --button-hover-text: #050505;
      --image-width: 440px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.018) 0,
          rgba(255, 255, 255, 0.018) 1px,
          transparent 1px,
          transparent 4px
        ),
        var(--bg);
      color: var(--text);
      font-family: "Times New Roman", Times, serif;
    }

    main {
      width: min(92vw, 720px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 64px 0;
      display: grid;
      place-content: center;
      text-align: center;
    }

    .frame {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 10px;
      border: 1px solid var(--line);
      background: #0c0c09;
      box-shadow:
        8px 8px 0 #181811,
        9px 9px 0 var(--line);
    }

    .hero-image {
      display: block;
      width: min(82vw, var(--image-width));
      margin: 0 auto;
      max-height: 54vh;
      object-fit: cover;
      filter: saturate(1.3) contrast(1.04);
    }

    .pixel-canvas {
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .image-title {
      margin: 28px auto 0;
      color: var(--text);
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: normal;
      line-height: 1.1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .description {
      max-width: 600px;
      margin: 14px auto 0;
      font-size: clamp(1.05rem, 2.7vw, 1.35rem);
      line-height: 1.55;
      letter-spacing: 0.035em;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    button {
      min-width: 120px;
      padding: 12px 20px;
      border: 1px solid var(--text);
      border-radius: 0;
      background: var(--button-bg);
      color: var(--text);
      font: inherit;
      font-size: 1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--line);
      transition:
        transform 120ms ease,
        box-shadow 120ms ease,
        background 120ms ease,
        color 120ms ease;
    }

    button:hover,
    button:focus-visible {
      background: var(--button-hover);
      color: var(--button-hover-text);
      outline: none;
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--line);
    }

    .status {
      min-height: 1.2em;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
    }

    /* 每次点击都会新建一个独立粒子，所以可以连续点击。 */
    .emoji-particle {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      pointer-events: none;
      user-select: none;
      transform-origin: center center;
      will-change: transform, opacity, filter;
      line-height: 1;
      font-family:
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Noto Color Emoji",
        sans-serif;
    }

    @media (prefers-reduced-motion: reduce) {
      .emoji-particle {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main>
    <section aria-labelledby="description">
      <div class="frame">
        <canvas class="hero-image pixel-canvas" id="pixelCanvas" role="img"></canvas>
        <img id="heroImage" alt="" hidden crossorigin="anonymous" />
      </div>

      <h1 class="image-title" id="imageTitle"></h1>
      <p class="description" id="description"></p>

      <div class="buttons" id="buttons" aria-label="Emoji 投掷按钮"></div>
      <div class="status" id="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const DEFAULT_CONFIG = {
      image: {
        src: "https://images.unsplash.com/photo-1490730141103-6cac27aaab94?auto=format&fit=crop&w=1200&q=85",
        alt: "彩色天空与远方景色",
        title: "彩色天空",
        pixelSize: 10
      },
      description: "一幅颜色明亮的风景。点击下方按钮，让 Emoji 穿过整个屏幕并在空中炸开。",
      buttons: [
        { label: "LOVE", emoji: "💖" },
        { label: "STAR", emoji: "⭐" },
        { label: "FRUIT", emoji: "🍊" }
      ],
      animation: {
        throwDuration: 850,
        explosionDuration: 1500,
        particleCount: 24,
        minSize: 24,
        maxSize: 54,
        explosionRadius: 340
      },
      theme: {
        background: "#050505",
        text: "#f4efc7",
        muted: "#b8b28f",
        line: "#706b4f",
        imageWidth: "440px"
      }
    };

    const $ = (selector) => document.querySelector(selector);

    async function loadConfig() {
      try {
        const response = await fetch("./config.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        $("#status").textContent =
          "未读取 config.json，当前使用内置默认配置。请通过本地服务器打开。";
        console.warn("config.json 加载失败：", error);
        return DEFAULT_CONFIG;
      }
    }

    function applyTheme(theme = {}) {
      const root = document.documentElement;
      const values = {
        "--bg": theme.background,
        "--text": theme.text,
        "--muted": theme.muted,
        "--line": theme.line,
        "--image-width": theme.imageWidth
      };

      for (const [name, value] of Object.entries(values)) {
        if (value) root.style.setProperty(name, value);
      }
    }

    function drawPixelatedImage(image, canvas, pixelSize = 10) {
      const sourceWidth = image.naturalWidth;
      const sourceHeight = image.naturalHeight;

      if (!sourceWidth || !sourceHeight) return;

      const maxDisplayWidth = Math.min(window.innerWidth * 0.82, 440);
      const scale = Math.min(1, maxDisplayWidth / sourceWidth);
      const displayWidth = Math.max(1, Math.round(sourceWidth * scale));
      const displayHeight = Math.max(1, Math.round(sourceHeight * scale));

      canvas.width = displayWidth;
      canvas.height = displayHeight;
      canvas.setAttribute("aria-label", image.alt || "像素风格图片");

      const context = canvas.getContext("2d");
      context.clearRect(0, 0, displayWidth, displayHeight);
      context.imageSmoothingEnabled = false;

      const blockSize = Math.max(1, Number(pixelSize) || 10);
      const sampleWidth = Math.max(1, Math.round(displayWidth / blockSize));
      const sampleHeight = Math.max(1, Math.round(displayHeight / blockSize));

      const buffer = document.createElement("canvas");
      buffer.width = sampleWidth;
      buffer.height = sampleHeight;

      const bufferContext = buffer.getContext("2d");
      bufferContext.imageSmoothingEnabled = true;
      bufferContext.drawImage(image, 0, 0, sampleWidth, sampleHeight);

      context.drawImage(
        buffer,
        0,
        0,
        sampleWidth,
        sampleHeight,
        0,
        0,
        displayWidth,
        displayHeight
      );
    }

    function render(config) {
      applyTheme(config.theme);

      const image = $("#heroImage");
      const canvas = $("#pixelCanvas");
      image.alt = config.image?.alt || DEFAULT_CONFIG.image.alt;
      image.onload = () => {
        drawPixelatedImage(
          image,
          canvas,
          config.image?.pixelSize ?? DEFAULT_CONFIG.image.pixelSize
        );
      };
      image.onerror = () => {
        $("#status").textContent =
          "图片加载失败。若使用外部图片，请确认图片服务器允许跨域读取。";
      };
      image.src = config.image?.src || DEFAULT_CONFIG.image.src;

      $("#imageTitle").textContent =
        config.image?.title || DEFAULT_CONFIG.image.title;

      $("#description").textContent =
        config.description || DEFAULT_CONFIG.description;

      const buttonContainer = $("#buttons");
      buttonContainer.replaceChildren();

      (config.buttons || DEFAULT_CONFIG.buttons).slice(0, 3).forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = `${item.emoji} ${item.label}`;
        button.setAttribute("aria-label", `投掷 ${item.emoji}`);
        button.addEventListener("click", () => {
          throwAndExplode(item.emoji, config.animation || {});
        });
        buttonContainer.appendChild(button);
      });
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function removeParticle(particle) {
      if (particle && particle.isConnected) {
        particle.remove();
      }
    }

    function createParticle(emoji, size, initialX = -9999, initialY = -9999) {
      const particle = document.createElement("span");
      particle.className = "emoji-particle";
      particle.textContent = emoji;
      particle.style.fontSize = `${size}px`;

      /*
       * 先把粒子放到指定位置，再插入页面。
       * 否则浏览器可能会先绘制一帧默认的 left: 0; top: 0，
       * 从而让 Emoji 短暂卡在左上角。
       */
      particle.style.transform =
        `translate3d(${initialX - size / 2}px, ${initialY - size / 2}px, 0) ` +
        "rotate(0deg) scale(0.01)";
      particle.style.opacity = "0";

      document.body.appendChild(particle);
      return particle;
    }

    function throwAndExplode(emoji, options) {
      const settings = { ...DEFAULT_CONFIG.animation, ...options };
      const size = random(settings.minSize, settings.maxSize);

      // 从屏幕下方随机位置投向屏幕中上方。
      const startX = random(0.12, 0.88) * window.innerWidth;
      const startY = window.innerHeight + size * 1.5;
      const targetX = random(0.25, 0.75) * window.innerWidth;
      const targetY = random(0.2, 0.48) * window.innerHeight;
      const throwRotation = random(-540, 540);

      const projectile = createParticle(emoji, size, startX, startY);

      const throwAnimation = projectile.animate(
        [
          {
            transform:
              `translate(${startX - size / 2}px, ${startY - size / 2}px) ` +
              "rotate(0deg) scale(0.85)",
            opacity: 0.25
          },
          {
            offset: 0.6,
            opacity: 1
          },
          {
            transform:
              `translate(${targetX - size / 2}px, ${targetY - size / 2}px) ` +
              `rotate(${throwRotation}deg) scale(1.15)`,
            opacity: 1
          }
        ],
        {
          duration: settings.throwDuration,
          easing: "cubic-bezier(.18,.72,.22,1)",
          fill: "forwards"
        }
      );

      throwAnimation.finished
        .then(() => {
          removeParticle(projectile);
          explode(emoji, targetX, targetY, settings);
        })
        .catch(() => removeParticle(projectile));

      // 某些浏览器在页面切换或动画被取消时不会可靠触发 finished。
      setTimeout(
        () => removeParticle(projectile),
        settings.throwDuration + 1000
      );
    }

    function explode(emoji, centerX, centerY, settings) {
      for (let index = 0; index < settings.particleCount; index += 1) {
        const angle =
          (Math.PI * 2 * index) / settings.particleCount + random(-0.16, 0.16);
        const distance = random(
          settings.explosionRadius * 0.38,
          settings.explosionRadius
        );
        const size = random(settings.minSize * 0.55, settings.maxSize * 0.9);
        const endX = Math.cos(angle) * distance;
        const endY = Math.sin(angle) * distance + random(30, 130);
        const spin = random(-900, 900);

        const particle = createParticle(emoji, size, centerX, centerY);

        const animation = particle.animate(
          [
            {
              transform:
                `translate(${centerX - size / 2}px, ${centerY - size / 2}px) ` +
                "rotate(0deg) scale(0.2)",
              opacity: 1,
              filter: "blur(0)"
            },
            {
              offset: 0.18,
              transform:
                `translate(${centerX + endX * 0.28 - size / 2}px, ` +
                `${centerY + endY * 0.18 - size / 2}px) ` +
                `rotate(${spin * 0.22}deg) scale(1.15)`,
              opacity: 1,
              filter: "blur(0)"
            },
            {
              transform:
                `translate(${centerX + endX - size / 2}px, ` +
                `${centerY + endY - size / 2}px) ` +
                `rotate(${spin}deg) scale(0.55)`,
              opacity: 0,
              filter: "blur(2px)"
            }
          ],
          {
            duration: settings.explosionDuration * random(0.82, 1.2),
            delay: random(0, 110),
            easing: "cubic-bezier(.12,.62,.22,1)",
            fill: "forwards"
          }
        );

        animation.finished
          .then(() => removeParticle(particle))
          .catch(() => removeParticle(particle));

        setTimeout(
          () => removeParticle(particle),
          settings.explosionDuration * 1.4 + 1200
        );
      }
    }

    let activeConfig = null;

    loadConfig().then((config) => {
      activeConfig = config;
      render(config);
    });

    window.addEventListener("resize", () => {
      const image = $("#heroImage");
      const canvas = $("#pixelCanvas");

      if (activeConfig && image.complete && image.naturalWidth) {
        drawPixelatedImage(
          image,
          canvas,
          activeConfig.image?.pixelSize ?? DEFAULT_CONFIG.image.pixelSize
        );
      }
    });
  </script>
</body>
</html>
